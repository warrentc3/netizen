<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules Direct API</title>
  <style>
    body { margin: 0; padding: 0; }
    .asset-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #101017;
      color: #d5d5e0;
      font-family: "Segoe UI", Arial, sans-serif;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }
    .asset-button {
      background: #2a6bf2;
      border: 0;
      color: #fff;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .asset-button:hover { background: #1d59d7; }
    .asset-status {
      font-size: 12px;
      opacity: 0.9;
    }
    .tool-panel {
      display: flex;
      gap: 16px;
      padding: 10px 12px;
      background: #16161e;
      font-family: "Segoe UI", Arial, sans-serif;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .tool-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tool-group label {
      color: #9999aa;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tool-group .tool-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .tool-input {
      background: #1e1e2a;
      border: 1px solid #333;
      color: #d5d5e0;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .tool-input:focus {
      outline: none;
      border-color: #2a6bf2;
    }
    .tool-input.invalid {
      border-color: #e54545;
    }
    .tool-input.valid {
      border-color: #3cb371;
    }
    .tool-hint {
      color: #666;
      font-size: 11px;
    }
    .tool-hint.error {
      color: #e54545;
    }
    .tool-output {
      background: #1e1e2a;
      border: 1px solid #333;
      color: #7ec87e;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: "Cascadia Code", "Consolas", monospace;
      min-width: 320px;
      user-select: all;
      cursor: text;
    }
    .tool-copy {
      background: #333;
      border: 0;
      color: #d5d5e0;
      border-radius: 4px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .tool-copy:hover { background: #444; }
    #swagger-ui .markdown,
    #swagger-ui .renderedMarkdown {
      line-height: 1.8;
    }
#swagger-ui .topbar { background-color: #1a1a2e; }
    #swagger-ui .topbar-wrapper img { display: none; }
    #swagger-ui .topbar-wrapper::before {
      content: "Schedules Direct API";
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding-left: 1rem;
    }
  </style>
</head>
<body>
  <div class="asset-toolbar">
    <button class="asset-button" id="download-deps" type="button">Download External JS Dependencies</button>
    <span class="asset-status" id="asset-status">Initializing Swagger UI assets...</span>
  </div>
  <div class="tool-panel">
    <div class="tool-group">
      <label>Token Credentials</label>
      <div class="tool-row">
        <input type="text" class="tool-input" id="username-input" placeholder="Username / email" style="width:200px">
        <input type="password" class="tool-input" id="sha-input" placeholder="Password" style="width:200px">
        <button class="asset-button" id="sha-generate" type="button">Hash</button>
        <span class="tool-output" id="sha-output" style="min-width:340px">&mdash;</span>
        <button class="tool-copy" id="sha-copy" type="button">Copy</button>
        <button class="asset-button" id="token-login" type="button" style="background:#2d8a4e">Authenticate</button>
        <span class="tool-hint" id="token-status"></span>
      </div>
    </div>
    <div class="tool-group">
      <label>User-Agent</label>
      <div class="tool-row">
        <input type="text" class="tool-input valid" id="ua-input" value="SDJsonUtil/1.0" style="width:300px">
        <span class="tool-hint" id="ua-hint">Format: name/version (e.g., myapp/1.0)</span>
      </div>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <script>
    const ASSETS = {
      css: {
        local: './swagger-ui.css',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui.css',
        downloadName: 'swagger-ui.css'
      },
      bundle: {
        local: './swagger-ui-bundle.js',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js',
        downloadName: 'swagger-ui-bundle.js'
      },
      preset: {
        local: './swagger-ui-standalone-preset.js',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js',
        downloadName: 'swagger-ui-standalone-preset.js'
      }
    };

    const statusEl = document.getElementById('asset-status');
    const downloadBtn = document.getElementById('download-deps');

    function setStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }

    function loadStylesheetWithFallback(localHref, remoteHref) {
      return new Promise((resolve, reject) => {
        const localLink = document.createElement('link');
        localLink.rel = 'stylesheet';
        localLink.href = localHref;
        localLink.onload = () => resolve('local');
        localLink.onerror = () => {
          localLink.remove();
          const remoteLink = document.createElement('link');
          remoteLink.rel = 'stylesheet';
          remoteLink.href = remoteHref;
          remoteLink.onload = () => resolve('remote');
          remoteLink.onerror = () => reject(new Error(`Failed to load stylesheet: ${remoteHref}`));
          document.head.appendChild(remoteLink);
        };
        document.head.appendChild(localLink);
      });
    }

    function loadScriptWithFallback(localSrc, remoteSrc) {
      return new Promise((resolve, reject) => {
        const localScript = document.createElement('script');
        localScript.src = localSrc;
        localScript.onload = () => resolve('local');
        localScript.onerror = () => {
          localScript.remove();
          const remoteScript = document.createElement('script');
          remoteScript.src = remoteSrc;
          remoteScript.onload = () => resolve('remote');
          remoteScript.onerror = () => reject(new Error(`Failed to load script: ${remoteSrc}`));
          document.body.appendChild(remoteScript);
        };
        document.body.appendChild(localScript);
      });
    }

    // --- User-Agent (must be declared before initializeSwagger) ---
    const UA_REGEX = /^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.+-]+(\s+\(.*\))?(\s+[A-Za-z0-9_.-]+\/[A-Za-z0-9_.+-]+(\s+\(.*\))?)*$/;
    const uaInput = document.getElementById('ua-input');
    const uaHint = document.getElementById('ua-hint');

    function requestInterceptor(req) {
      const ua = uaInput.value.trim();
      if (ua && UA_REGEX.test(ua)) {
        req.headers['User-Agent'] = ua;
      }
      // Proxy API calls through local server to avoid CORS
      const sdBase = 'https://json.schedulesdirect.org/20141201';
      if (req.url.startsWith(sdBase) && window.location.hostname === '127.0.0.1') {
        req.url = req.url.replace(sdBase, window.location.origin + '/api');
      }
      return req;
    }

    let swaggerUi;

    function initializeSwagger() {
      swaggerUi = SwaggerUIBundle({
        url: "./schedulesdirect-api_openapi-v3.1.0.json",
        dom_id: "#swagger-ui",
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
        tryItOutEnabled: ['127.0.0.1', 'localhost'].includes(window.location.hostname),
        persistAuthorization: true,
        deepLinking: true,
        displayRequestDuration: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: "list",
        filter: true,
        validatorUrl: null,
        requestInterceptor: requestInterceptor
      });
    }

    async function downloadDependencies() {
      downloadBtn.disabled = true;
      setStatus('Downloading dependency files...');
      try {
        const files = [ASSETS.css, ASSETS.bundle, ASSETS.preset];
        for (const file of files) {
          const response = await fetch(file.remote, { cache: 'no-store' });
          if (!response.ok) throw new Error('Download failed: ' + file.remote);
          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement('a');
          anchor.href = objectUrl;
          anchor.download = file.downloadName;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objectUrl);
        }
        setStatus('Downloaded files. Move them next to this index.html for local-first loading.');
      } catch (error) {
        setStatus(`Download failed: ${error.message}`);
      } finally {
        downloadBtn.disabled = false;
      }
    }

    async function boot() {
      try {
        setStatus('Loading local Swagger assets if present...');
        const cssSource = await loadStylesheetWithFallback(ASSETS.css.local, ASSETS.css.remote);
        const bundleSource = await loadScriptWithFallback(ASSETS.bundle.local, ASSETS.bundle.remote);
        const presetSource = await loadScriptWithFallback(ASSETS.preset.local, ASSETS.preset.remote);
        initializeSwagger();
        const allLocal = cssSource === 'local' && bundleSource === 'local' && presetSource === 'local';
        if (allLocal) {
          downloadBtn.style.display = 'none';
          setStatus('All assets loaded locally.');
        } else {
          setStatus(`Assets loaded: css=${cssSource}, bundle=${bundleSource}, preset=${presetSource}`);
        }
      } catch (error) {
        setStatus(`Asset load failed: ${error.message}`);
      }
    }

    // --- SHA1 Hash Tool ---
    async function sha1Hex(str) {
      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-1', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const shaInput = document.getElementById('sha-input');
    const shaOutput = document.getElementById('sha-output');
    const shaGenerate = document.getElementById('sha-generate');
    const shaCopy = document.getElementById('sha-copy');

    async function generateHash() {
      const pw = shaInput.value;
      if (!pw) { shaOutput.textContent = '\u2014'; return; }
      shaOutput.textContent = await sha1Hex(pw);
    }

    shaGenerate.addEventListener('click', generateHash);
    shaInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateHash(); });
    shaCopy.addEventListener('click', () => {
      const text = shaOutput.textContent;
      if (text && text !== '\u2014') navigator.clipboard.writeText(text);
    });

    // --- Authenticate Tool ---
    const tokenLogin = document.getElementById('token-login');
    const tokenStatus = document.getElementById('token-status');
    const usernameInput = document.getElementById('username-input');

    async function authenticate() {
      const ua = uaInput.value.trim();
      if (!ua || !UA_REGEX.test(ua)) {
        tokenStatus.textContent = 'Valid User-Agent required (set it first)';
        tokenStatus.classList.add('error');
        uaInput.focus();
        return;
      }

      const username = usernameInput.value.trim();
      if (!username) {
        tokenStatus.textContent = 'Username required';
        tokenStatus.classList.add('error');
        return;
      }

      let passwordHash = shaOutput.textContent;
      if (!passwordHash || passwordHash === '\u2014') {
        const pw = shaInput.value;
        if (!pw) {
          tokenStatus.textContent = 'Password required';
          tokenStatus.classList.add('error');
          return;
        }
        passwordHash = await sha1Hex(pw);
        shaOutput.textContent = passwordHash;
      }

      tokenLogin.disabled = true;
      tokenStatus.classList.remove('error');
      tokenStatus.textContent = 'Authenticating...';

      try {
        const ua = uaInput.value.trim();
        const headers = { 'Content-Type': 'application/json' };
        if (ua && UA_REGEX.test(ua)) headers['User-Agent'] = ua;

        const resp = await fetch('https://json.schedulesdirect.org/20141201/token', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ username: username, password: passwordHash })
        });

        const data = await resp.json();

        if (data.code === 0 && data.token) {
          swaggerUi.preauthorizeApiKey('TokenHeader', data.token);
          const expires = data.tokenExpires
            ? new Date(data.tokenExpires * 1000).toLocaleTimeString()
            : '?';
          tokenStatus.classList.remove('error');
          tokenStatus.textContent = 'Authorized \u2014 token expires ' + expires;
          tokenStatus.style.color = '#3cb371';
        } else {
          tokenStatus.classList.add('error');
          tokenStatus.textContent = (data.response || 'ERROR') + ': ' + (data.message || 'Authentication failed');
          tokenStatus.style.color = '';
        }
      } catch (err) {
        tokenStatus.classList.add('error');
        tokenStatus.textContent = 'Request failed: ' + err.message;
        tokenStatus.style.color = '';
      } finally {
        tokenLogin.disabled = false;
      }
    }

    tokenLogin.addEventListener('click', authenticate);

    // --- User-Agent validation ---
    function validateUa() {
      const val = uaInput.value.trim();
      if (!val) {
        uaInput.classList.remove('valid', 'invalid');
        uaHint.textContent = 'Format: name/version (e.g., myapp/1.0)';
        uaHint.classList.remove('error');
        return;
      }
      if (UA_REGEX.test(val)) {
        uaInput.classList.add('valid');
        uaInput.classList.remove('invalid');
        uaHint.textContent = 'Valid — will be sent with Try It Out requests';
        uaHint.classList.remove('error');
      } else {
        uaInput.classList.add('invalid');
        uaInput.classList.remove('valid');
        uaHint.textContent = 'Must match: name/version — letters, digits, dots, hyphens, underscores';
        uaHint.classList.add('error');
      }
    }

    uaInput.addEventListener('input', validateUa);

    if (downloadBtn) {
      downloadBtn.addEventListener('click', downloadDependencies);
    }

    boot();
  </script>
</body>
</html>
