<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technitium DNS Server API</title>
  <style>
    body { margin: 0; padding: 0; }
    .asset-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #101017;
      color: #d5d5e0;
      font-family: "Segoe UI", Arial, sans-serif;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }
    .asset-button {
      background: #2a6bf2;
      border: 0;
      color: #fff;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .asset-button:hover { background: #1d59d7; }
    .asset-status {
      font-size: 12px;
      opacity: 0.9;
    }
    #swagger-ui .topbar { background-color: #1a1a2e; }
    #swagger-ui .topbar-wrapper img { display: none; }
    #swagger-ui .topbar-wrapper::before {
      content: "Technitium DNS Server API v14.3";
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding-left: 1rem;
    }
  </style>
</head>
<body>
  <div class="asset-toolbar">
    <button class="asset-button" id="download-deps" type="button">Download External JS Dependencies</button>
    <span class="asset-status" id="asset-status">Initializing Swagger UI assets...</span>
  </div>
  <div id="swagger-ui"></div>
  <script>
    const ASSETS = {
      css: {
        local: './swagger-ui.css',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui.css',
        downloadName: 'swagger-ui.css'
      },
      bundle: {
        local: './swagger-ui-bundle.js',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js',
        downloadName: 'swagger-ui-bundle.js'
      },
      preset: {
        local: './swagger-ui-standalone-preset.js',
        remote: 'https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js',
        downloadName: 'swagger-ui-standalone-preset.js'
      }
    };

    const statusEl = document.getElementById('asset-status');
    const downloadBtn = document.getElementById('download-deps');

    function setStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }

    function loadStylesheetWithFallback(localHref, remoteHref) {
      return new Promise((resolve, reject) => {
        const localLink = document.createElement('link');
        localLink.rel = 'stylesheet';
        localLink.href = localHref;
        localLink.onload = () => resolve('local');
        localLink.onerror = () => {
          localLink.remove();
          const remoteLink = document.createElement('link');
          remoteLink.rel = 'stylesheet';
          remoteLink.href = remoteHref;
          remoteLink.onload = () => resolve('remote');
          remoteLink.onerror = () => reject(new Error(`Failed to load stylesheet: ${remoteHref}`));
          document.head.appendChild(remoteLink);
        };
        document.head.appendChild(localLink);
      });
    }

    function loadScriptWithFallback(localSrc, remoteSrc) {
      return new Promise((resolve, reject) => {
        const localScript = document.createElement('script');
        localScript.src = localSrc;
        localScript.onload = () => resolve('local');
        localScript.onerror = () => {
          localScript.remove();
          const remoteScript = document.createElement('script');
          remoteScript.src = remoteSrc;
          remoteScript.onload = () => resolve('remote');
          remoteScript.onerror = () => reject(new Error(`Failed to load script: ${remoteSrc}`));
          document.body.appendChild(remoteScript);
        };
        document.body.appendChild(localScript);
      });
    }

    function initializeSwagger() {
      SwaggerUIBundle({
        url: "./technitium-dns-api_openapi-v3.0.3.json",
        dom_id: "#swagger-ui",
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
        tryItOutEnabled: ['127.0.0.1', 'localhost'].includes(window.location.hostname),
        persistAuthorization: true,
        deepLinking: true,
        displayRequestDuration: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: "list",
        filter: true,
        validatorUrl: null
      });
    }

    async function downloadDependencies() {
      downloadBtn.disabled = true;
      setStatus('Downloading dependency files...');
      try {
        const files = [ASSETS.css, ASSETS.bundle, ASSETS.preset];
        for (const file of files) {
          const response = await fetch(file.remote, { cache: 'no-store' });
          if (!response.ok) throw new Error(`Download failed: ${file.remote}`);
          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement('a');
          anchor.href = objectUrl;
          anchor.download = file.downloadName;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objectUrl);
        }
        setStatus('Downloaded files. Move them next to this index.html for local-first loading.');
      } catch (error) {
        setStatus(`Download failed: ${error.message}`);
      } finally {
        downloadBtn.disabled = false;
      }
    }

    async function boot() {
      try {
        setStatus('Loading local Swagger assets if present...');
        const cssSource = await loadStylesheetWithFallback(ASSETS.css.local, ASSETS.css.remote);
        const bundleSource = await loadScriptWithFallback(ASSETS.bundle.local, ASSETS.bundle.remote);
        const presetSource = await loadScriptWithFallback(ASSETS.preset.local, ASSETS.preset.remote);
        initializeSwagger();
        setStatus(`Swagger assets loaded: css=${cssSource}, bundle=${bundleSource}, preset=${presetSource}`);
      } catch (error) {
        setStatus(`Asset load failed: ${error.message}`);
      }
    }

    if (downloadBtn) {
      downloadBtn.addEventListener('click', downloadDependencies);
    }

    boot();
  </script>
</body>
</html>
