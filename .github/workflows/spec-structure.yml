name: Spec Directory Structure

on:
  push:
    branches: [main]
    paths:
      - "catalog.json"
      - "index.html"
      - "scripts/**"
      - ".github/workflows/**"
      - "*/index.html"
      - "*-*/**/*-api_openapi-v*.json"
      - "*/*-api_openapi-v*.json"
  pull_request:
    branches: [main]
    paths:
      - "catalog.json"
      - "index.html"
      - "scripts/**"
      - ".github/workflows/**"
      - "*/index.html"
      - "*-*/**/*-api_openapi-v*.json"
      - "*/*-api_openapi-v*.json"

concurrency:
  group: spec-structure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate spec directory structure
        run: |
          failed=0
          catalog_keys=$(python3 -c "import json; d=json.load(open('catalog.json')); print('\n'.join(d.keys()))")

          # Directories that are infrastructure, not spec dirs
          skip_dirs=(".github" "scripts")

          for dir in */; do
            name="${dir%/}"
            [[ "$name" == .* ]] && continue
            [[ " ${skip_dirs[*]} " == *" $name "* ]] && continue

            files=("$dir"*)
            count=${#files[@]}

            if [[ $count -ne 4 ]]; then
              echo "FAIL: $dir — expected 4 files (index.html, spec JSON, serve.py, serve.ps1), found $count"
              for f in "${files[@]}"; do echo "  $f"; done
              failed=1
              continue
            fi

            has_index=0
            has_spec=0
            for f in "${files[@]}"; do
              [[ "$f" == "${dir}index.html" ]] && has_index=1
              [[ "$f" =~ ^${dir}.*-api_openapi-v[0-9]+\.[0-9]+.*\.json$ ]] && has_spec=1
            done

            if [[ $has_index -eq 0 ]]; then
              echo "FAIL: $dir — missing index.html"
              failed=1
            fi

            if [[ $has_spec -eq 0 ]]; then
              echo "FAIL: $dir — missing *-api_openapi-v{version}.json"
              failed=1
            fi

            if ! echo "$catalog_keys" | grep -qx "$name"; then
              echo "FAIL: $dir — no entry in catalog.json"
              failed=1
            fi

            if [[ $has_index -eq 1 && $has_spec -eq 1 ]] && echo "$catalog_keys" | grep -qx "$name"; then
              echo "OK:   $dir"
            fi
          done

          python3 scripts/validate-catalog.py || failed=1

          if [[ $failed -ne 0 ]]; then
            echo "Structure validation failed"
            exit 1
          fi

      - name: Build ZIP bundles for all spec folders
        run: |
          set -euo pipefail

          mkdir -p dist
          mapfile -t spec_dirs < <(python3 -c "import json; d=json.load(open('catalog.json')); print('\\n'.join(sorted(d.keys())))")

          if [[ ${#spec_dirs[@]} -eq 0 ]]; then
            echo "No spec folders found in catalog.json"
            exit 1
          fi

          for folder in "${spec_dirs[@]}"; do
            [[ -d "$folder" ]] || { echo "Missing directory: $folder"; exit 1; }
            zip -r "dist/${folder//\//-}.zip" "$folder" > /dev/null
            echo "Built dist/${folder//\//-}.zip"
          done

      - name: Upload ZIP artifacts for this run
        uses: actions/upload-artifact@v7
        with:
          name: spec-folder-zips-${{ github.run_id }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish ZIPs to public release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="spec-bundles-latest"
          title="Spec Bundles (Latest)"
          timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
          notes="Public ZIP bundles for individual spec folders. Last updated: ${timestamp}."

          # Delete and recreate to reset the release timestamp
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release delete "$tag" --yes
            git push --delete origin "$tag" 2>/dev/null || true
          fi

          gh release create "$tag" --title "$title" --notes "$notes" dist/*.zip

      - name: Job summary
        run: |
          {
            echo "## Spec Build Outputs"
            echo
            echo "- ZIPs generated: $(ls dist/*.zip | wc -l)"
            echo "- Run artifact: spec-folder-zips-${{ github.run_id }}"
            if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "- Public release: https://github.com/${{ github.repository }}/releases/tag/spec-bundles-latest"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Enrich + commit-back deferred — revisit when bot-signed commits are sorted
      # - name: Enrich catalog.json with spec metadata
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   run: python3 scripts/enrich-catalog.py
