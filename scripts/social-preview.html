<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1280px;
      height: 640px;
      background: #090c11;
      color: #e6ebf1;
      font-family: "Segoe UI", "Aptos", "Trebuchet MS", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .wrap {
      width: 100%;
      padding: 0 72px;
      box-sizing: border-box;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .brand-mark {
      width: 222px;
      height: 149px;
      flex: 0 0 auto;
    }
    .wordmark {
      font-size: 84px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #eef4ff;
      margin: 0;
    }
    .tagline {
      font-size: 54px;
      color: #aab8ce;
      margin-top: 14px;
      line-height: 1.2;
    }

    .about-divider {
      border: 0;
      border-top: 2px solid rgba(184, 201, 223, 0.28);
      margin: 26px 0 20px;
      width: 100%;
      max-width: 940px;
    }

    .about-text {
      font-size: 38px;
      color: #d3dded;
      line-height: 1.28;
      max-width: 1040px;
      margin: 0;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg class="brand-mark" viewBox="248 97 182 120" role="img" aria-label="netizen mark">
        <defs>
          <clipPath id="mc">
            <circle cx="294" cy="171" r="32" />
            <circle cx="342" cy="152" r="47" />
            <circle cx="392" cy="171" r="32" />
            <rect x="257" y="174" width="170" height="33" rx="16" />
          </clipPath>
        </defs>
        <g fill="#AFA9EC">
          <circle cx="294" cy="171" r="32" />
          <circle cx="342" cy="152" r="47" />
          <circle cx="392" cy="171" r="32" />
          <rect x="257" y="174" width="170" height="33" rx="16" />
        </g>
        <path fill="#F0997B" clip-path="url(#mc)" d="M 297,65 L 430,277 L 414,287 L 281,75 Z" />
        <g fill="#F0997B" transform="translate(316,113) rotate(-46)">
          <path d="M 0,0 C -13,-17 -35,-24 -30,-9 C -25,6 -8,9 0,0 Z" />
          <path d="M 0,0 C 13,-17 35,-24 30,-9 C 25,6 8,9 0,0 Z" />
          <ellipse rx="7" ry="5" />
        </g>
      </svg>
      <div>
        <h1 class="wordmark">netizen</h1>
        <div class="tagline">For the Community, by the Community.</div>
        <hr class="about-divider" />
        <p class="about-text">High-quality API specs and Swagger UIs for tools that deserve better documentation</p>
      </div>
    </div>
  </div>
</body>
</html>
