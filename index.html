<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>netizen — API Specs</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script>
    try {
      const t = localStorage.getItem('netizen-theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) { }
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #eef1f5;
      --bg-accent: #e1e7ef;
      --text: #1d232b;
      --text-muted: #5f6976;
      --border: rgba(44, 58, 77, 0.18);
      --border-strong: rgba(44, 58, 77, 0.35);
      --card-bg: rgba(255, 255, 255, 0.86);
      --chip-bg: #e8edf3;
      --chip-text: #4f5a67;
      --chip-border: rgba(44, 58, 77, 0.12);
      --action-hover: #e4eaf2;
      --skeleton: #dfe5ee;
      --footer-badge-bg: #e8edf3;
      --footer-badge-text: #687385;
      --shadow: 0 10px 28px rgba(31, 44, 60, 0.1);
      --swagger-link: #2f8f4d;
      --swagger-link-border: #8dd3a2;
      --swagger-link-hover: #e4f4ea;
      --page-font: "Segoe UI", "Aptos", "Trebuchet MS", system-ui, -apple-system, sans-serif;
      --mono-font: "Cascadia Mono", "Consolas", "SFMono-Regular", "Liberation Mono", monospace;
    }

    :root[data-theme="dark"] {
      --bg: #090c11;
      --bg-accent: #121821;
      --text: #e6ebf1;
      --text-muted: #a1adbc;
      --border: rgba(184, 201, 223, 0.14);
      --border-strong: rgba(184, 201, 223, 0.3);
      --card-bg: rgba(18, 24, 33, 0.92);
      --chip-bg: #18202a;
      --chip-text: #bdc8d7;
      --chip-border: rgba(184, 201, 223, 0.14);
      --action-hover: #1d2733;
      --skeleton: #151d28;
      --footer-badge-bg: #18212c;
      --footer-badge-text: #a8b5c6;
      --shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
      --swagger-link: #8ed8aa;
      --swagger-link-border: #2f8f4d;
      --swagger-link-hover: #1a3a25;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #090c11;
        --bg-accent: #121821;
        --text: #e6ebf1;
        --text-muted: #a1adbc;
        --border: rgba(184, 201, 223, 0.14);
        --border-strong: rgba(184, 201, 223, 0.3);
        --card-bg: rgba(18, 24, 33, 0.92);
        --chip-bg: #18202a;
        --chip-text: #bdc8d7;
        --chip-border: rgba(184, 201, 223, 0.14);
        --action-hover: #1d2733;
        --skeleton: #151d28;
        --footer-badge-bg: #18212c;
        --footer-badge-text: #a8b5c6;
        --shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
      }
    }

    body {
      font-family: var(--page-font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem
    }

    .site-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .wordmark {
      font-size: 31px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1
    }

    .tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px
    }

    .theme-btn {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1;
      flex-shrink: 0;
      margin-top: 4px;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s
    }

    .theme-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--action-hover)
    }

    .catalog-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem
    }

    .spec-card {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px)
    }

    .spec-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.15)
    }

    .spec-name {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px
    }

    .spec-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .chip {
      font-size: 11px;
      font-family: var(--mono-font);
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--chip-bg);
      color: var(--chip-text);
      border: 0.5px solid var(--chip-border)
    }

    .chip-green {
      background: #EAF3DE;
      color: #3B6D11;
      border-color: #C0DD97
    }

    .chip-blue {
      background: #E6F1FB;
      color: #185FA5;
      border-color: #B5D4F4
    }

    .chip-amber {
      background: #FAEEDA;
      color: #854F0B;
      border-color: #FAC775
    }

    :root[data-theme="dark"] .chip-green {
      background: #27500A;
      color: #C0DD97;
      border-color: #3B6D11
    }

    :root[data-theme="dark"] .chip-blue {
      background: #0C447C;
      color: #B5D4F4;
      border-color: #185FA5
    }

    :root[data-theme="dark"] .chip-amber {
      background: #633806;
      color: #FAC775;
      border-color: #854F0B
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .chip-green {
        background: #27500A;
        color: #C0DD97;
        border-color: #3B6D11
      }

      :root:not([data-theme="light"]) .chip-blue {
        background: #0C447C;
        color: #B5D4F4;
        border-color: #185FA5
      }

      :root:not([data-theme="light"]) .chip-amber {
        background: #633806;
        color: #FAC775;
        border-color: #854F0B
      }
    }

    .spec-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      white-space: nowrap
    }

    .action-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 8px;
      display: block;
      transition: background-color 0.15s, color 0.15s
    }

    .action-link:hover {
      background: var(--action-hover);
      color: var(--text)
    }

    .action-link-primary {
      font-size: 12px;
      font-weight: 500;
      color: var(--swagger-link);
      text-decoration: none;
      padding: 4px 8px;
      border: 0.5px solid var(--swagger-link-border);
      border-radius: 8px;
      display: block;
      transition: background-color 0.15s, color 0.15s
    }

    .action-link-primary:hover {
      background: var(--swagger-link-hover)
    }

    .ghost-card {
      border: 0.5px dashed var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
      min-height: 90px
    }

    .skeleton {
      background: var(--skeleton);
      border-radius: 12px;
      height: 130px;
      margin-bottom: 1rem;
      animation: pulse 1.4s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px
    }

    .footer-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none
    }

    .footer-link:hover {
      color: var(--text)
    }

    .footer-badge {
      font-size: 11px;
      font-family: var(--mono-font);
      padding: 3px 10px;
      border-radius: 4px;
      background: var(--footer-badge-bg);
      color: var(--footer-badge-text);
      border: 0.5px solid var(--chip-border);
      text-decoration: none;
      display: inline-block
    }

    .footer-badge:hover {
      color: var(--text);
      border-color: var(--border-strong)
    }

    .mc {
      fill: #7F77DD
    }

    .mr {
      fill: #D85A30
    }

    :root[data-theme="dark"] .mc {
      fill: #AFA9EC
    }

    :root[data-theme="dark"] .mr {
      fill: #F0997B
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .mc {
        fill: #AFA9EC
      }

      :root:not([data-theme="light"]) .mr {
        fill: #F0997B
      }
    }

    .error-msg {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 2rem 0
    }

    @media (max-width: 640px) {
      .site-header {
        padding: 1.75rem 0 1.5rem;
        margin-bottom: 1.75rem;
      }

      .wordmark {
        font-size: 28px;
      }

      .spec-card {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 1rem 1rem 1.1rem;
      }

      .spec-actions {
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .site-footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="site-header">
      <div class="brand">
        <svg width="60" height="40" viewBox="248 97 182 120" role="img" aria-label="netizen mark">
          <defs>
            <clipPath id="mc">
              <circle cx="294" cy="171" r="32" />
              <circle cx="342" cy="152" r="47" />
              <circle cx="392" cy="171" r="32" />
              <rect x="257" y="174" width="170" height="33" rx="16" />
            </clipPath>
          </defs>
          <g class="mc">
            <circle cx="294" cy="171" r="32" />
            <circle cx="342" cy="152" r="47" />
            <circle cx="392" cy="171" r="32" />
            <rect x="257" y="174" width="170" height="33" rx="16" />
          </g>
          <path class="mr" clip-path="url(#mc)" d="M 297,65 L 430,277 L 414,287 L 281,75 Z" />
          <g class="mr" transform="translate(316,113) rotate(-46)">
            <path d="M 0,0 C -13,-17 -35,-24 -30,-9 C -25,6 -8,9 0,0 Z" />
            <path d="M 0,0 C 13,-17 35,-24 30,-9 C 25,6 8,9 0,0 Z" />
            <ellipse rx="7" ry="5" />
          </g>
        </svg>
        <div>
          <div class="wordmark">netizen</div>
          <div class="tagline">For the Community, by the Community.</div>
        </div>
      </div>
      <button class="theme-btn" id="theme-btn">⊙</button>
    </header>

    <p style="font-size:12px; color:var(--text-muted); text-align:center; line-height:1.6;">
      Each ZIP bundle includes the OpenAPI spec, an interactive Swagger UI, and local serve scripts (Python &amp; PowerShell) with API proxy and auto-shutdown.
    </p>
    <hr style="border:none; border-top:0.5px solid var(--border); margin:1.5rem 0;">
    <p class="catalog-label">Catalog</p>
    <div id="catalog"></div>

    <footer class="site-footer">
      <a class="footer-link" href="https://github.com/warrentc3/netizen">github.com/warrentc3/netizen</a>
      <a class="footer-badge" href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0 Universal (CC0 1.0) Public Domain Dedication</a>
    </footer>
  </div>

  <script>
    const el = document.getElementById('catalog');

    function getAppRootPath() {
      const url = new URL(window.location.href);
      const last = url.pathname.split('/').pop() || '';
      const isFilePath = last.includes('.');

      if (!url.pathname.endsWith('/') && !isFilePath) {
        url.pathname = `${url.pathname}/`;
      }

      return new URL('.', url).pathname;
    }

    function joinAppPath(root, segment) {
      const left = root.endsWith('/') ? root.slice(0, -1) : root;
      const right = segment.startsWith('/') ? segment.slice(1) : segment;
      return `${left}/${right}`;
    }

    function getReleaseBaseUrl() {
      const host = window.location.hostname;
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      if (host.endsWith('.github.io') && pathParts.length >= 1) {
        const owner = host.slice(0, -10);
        const repo = pathParts[0];
        return `https://github.com/${owner}/${repo}/releases/download/spec-bundles-latest`;
      }
      return 'https://github.com/warrentc3/netizen/releases/download/spec-bundles-latest';
    }

    const appRootPath = getAppRootPath();
    const releaseBaseUrl = getReleaseBaseUrl();

    // Theme toggle
    const modes = ['system', 'dark', 'light'], icons = { system: '⊙', dark: '☽', light: '☀' };
    let cur;
    try { cur = localStorage.getItem('netizen-theme') || 'system'; } catch (e) { cur = 'system'; }
    const btn = document.getElementById('theme-btn');
    function applyTheme(m) {
      const r = document.documentElement;
      if (m === 'dark') r.setAttribute('data-theme', 'dark');
      else if (m === 'light') r.setAttribute('data-theme', 'light');
      else r.removeAttribute('data-theme');
      if (btn) btn.textContent = icons[m];
    }
    applyTheme(cur);
    if (btn) btn.addEventListener('click', () => {
      cur = modes[(modes.indexOf(cur) + 1) % modes.length];
      try { localStorage.setItem('netizen-theme', cur); } catch (e) { }
      applyTheme(cur);
    });

    function renderCard(folder, meta = {}) {
      const base = joinAppPath(appRootPath, folder);
      const name = meta.name || folder;
      const desc = meta.description || '';
      const tags = meta.tags || [];
      const swagger = meta.spec_file || null;
      const zipName = `${folder.replace(/\//g, '-')}.zip`;
      const zipUrl = `${releaseBaseUrl}/${zipName}`;

      const actions = [
        `<a class="action-link" href="${zipUrl}">Download ZIP ↗</a>`,
        `<a class="action-link-primary" href="${base}/">Swagger UI ↗</a>`,
        swagger ? `<a class="action-link" href="${base}/${swagger}">JSON spec ↗</a>` : '',
        meta.upstream ? `<a class="action-link" href="${meta.upstream}">GitHub ↗</a>` : '',
        meta.site ? `<a class="action-link" href="${meta.site}">Website ↗</a>` : '',
      ].filter(Boolean).join('');

      const chips = [
        ...tags.map(t => `<span class="chip">${t}</span>`),
        meta.endpoints ? `<span class="chip chip-amber">${meta.endpoints} endpoints</span>` : '',
      ].filter(Boolean).join('');

      return `
      <article class="spec-card" data-href="${base}/" role="link" tabindex="0" aria-label="${name} API spec">
        <div>
          <div class="spec-name">${name}</div>
          ${desc ? `<p class="spec-desc">${desc}</p>` : ''}
          <div class="chips">${chips}</div>
        </div>
        <div class="spec-actions">${actions}</div>
      </article>`;
    }

    // catalog.json content is trusted and rendered directly into cards
    async function loadCatalog() {
      el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>'; // safe static markup
      try {
        // const res = await fetch('https://raw.githubusercontent.com/warrentc3/netizen/main/catalog.json');
        const res = await fetch('./catalog.json', { cache: 'force-cache' });
        if (!res.ok) throw new Error('catalog fetch failed');
        const catalog = await res.json();

        const entries = Object.entries(catalog);
        if (!entries.length) {
          el.innerHTML = '<div class="ghost-card">no specs yet</div>'; // safe static markup
          return;
        }

        const cards = entries.map(([key, meta]) => renderCard(key, meta));
        el.innerHTML = cards.join(''); // safe — renderCard output is template-controlled
      } catch (e) {
        el.innerHTML = '<p class="error-msg">Could not load catalog — check back soon.</p>'; // safe static markup
      }
    }

    // Make the whole card clickable without nesting links inside links.
    el.addEventListener('click', (event) => {
      const card = event.target.closest('.spec-card');
      if (!card || event.target.closest('a')) return;
      const href = card.dataset.href;
      if (href) window.location.href = href;
    });

    el.addEventListener('keydown', (event) => {
      const card = event.target.closest('.spec-card');
      if (!card) return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        const href = card.dataset.href;
        if (href) window.location.href = href;
      }
    });

    loadCatalog();
  </script>
</body>

</html>
